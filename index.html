<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GuideMe — видеть мир ушами</title>
    
    <link rel="stylesheet" href="css/style.css">
    

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>👁️ GuideMe</h1>
            <div class="subtitle">видеть мир ушами — голосовой помощник для незрячих</div>
        </header>
        
        <main>
            <div class="video-container">
                <video id="video" autoplay playsinline></video>
                <canvas id="overlay"></canvas>
            </div>
            
            <div class="controls">
                <button id="startBtn" class="primary">▶ Запустить камеру</button>
                <button id="stopBtn" disabled>⏹ Остановить</button>
                <button id="describeBtn" disabled>🔊 Опиши сцену</button>
                <button id="calibrateBtn" disabled>📏 Калибровка</button>
                <button id="settingsBtn">⚙️ Настройки</button>
                <button id="testVoiceBtn">🔊 Тест голоса</button>
            </div>
            
            <!-- Панель настроек -->
            <div id="settingsPanel" class="settings-panel hidden">
                <h3>Настройки</h3>
                <div class="setting-item">
                    <label>🔊 Громкость</label>
                    <input type="range" id="volume" min="0" max="1" step="0.1" value="1">
                </div>
                <div class="setting-item">
                    <label>⚡ Частота подсказок (сек)</label>
                    <input type="range" id="frequency" min="3" max="10" step="1" value="5">
                </div>
                <div class="setting-item">
                    <label>🎯 Минимальная уверенность</label>
                    <input type="range" id="confidence" min="0.3" max="0.9" step="0.1" value="0.4">
                </div>
                <div class="setting-item">
                    <label>⚠️ Порог опасности (метры)</label>
                    <input type="range" id="dangerThreshold" min="0.5" max="3" step="0.1" value="1.5">
                </div>
                <div class="setting-item checkbox">
                    <input type="checkbox" id="soundEnabled" checked>
                    <label>🔊 Звук</label>
                </div>
                <button id="closeSettingsBtn">Готово</button>
            </div>
            
            <div class="status-panel">
                <div class="status-title">Текущая ситуация</div>
                <div id="status">Ожидание запуска камеры...</div>
            </div>
            
            <div class="detection-log">
                <div class="log-title">Журнал событий</div>
                <div id="log"></div>
            </div>
            
            <div class="info-panel">
                <div class="info-item">
                    <span class="info-label">Модель:</span>
                    <span id="modelStatus">⏳ загрузка...</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Аудио:</span>
                    <span id="audioStatus">⏳ загрузка</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Калибровка:</span>
                    <span id="calibStatus">не выполнена</span>
                </div>
            </div>
        </main>
        
        <footer>
            <div class="footer">
                ⚠️ Альфа-версия 1.7— стабильная версия. 
                <br>
                <span class="small">Технологии на службе добра 🌟</span>
            </div>
        </footer>
    </div>
    
    <script src="js/core/constants.js"></script>
    <script src="js/core/translations.js"></script>
    <script src="js/core/utils.js"></script>
    <script src="js/core/speechgot.js"></script>
    <script src="js/core/voice-command.js"></script>
    <script src="js/vision/camera.js"></script>
    <script src="js/vision/detection.js"></script>
    <script src="js/vision/object-tracker.js"></script>
    <script src="js/features/calibration.js"></script>
    <script src="js/features/safety.js"></script>
    <script src="js/features/navigation.js"></script>
    <script src="js/utils/helpers.js"></script>
    <script src="js/utils/newversion.js"></script>
    <script src="js/ui/ui-core.js"></script>
    <script src="js/ui/ui-controls.js"></script>
    <script src="js/ui/ui-settings.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
